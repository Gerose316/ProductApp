<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum - AI Goal Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #ec4899;
            --accent-light: #f472b6;
            --success: #10b981;
            --warning: #f59e0b;
            --bg-dark: #0f172a;
            --bg-light: #f8fafc;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --font-display: 'Poppins', sans-serif;
            --font-body: 'Outfit', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1f35 100%);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            margin-bottom: 40px;
            gap: 30px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .daily-quote {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .daily-quote p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-style: italic;
        }

        .daily-quote .author {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
        }

        .time-display {
            text-align: right;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .time-display h3 {
            font-size: 32px;
            font-family: var(--font-display);
            margin-bottom: 5px;
        }

        .time-display p {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        /* Focus Mode Card */
        .focus-mode-card {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.15) 0%, rgba(99, 102, 241, 0.1) 100%);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-out 0.9s both;
        }

        .focus-mode-card h2 {
            font-family: var(--font-display);
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .focus-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .focus-input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 13px;
        }

        .focus-input::placeholder {
            color: var(--text-secondary);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-family: var(--font-body);
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-secondary:hover {
            background: rgba(99, 102, 241, 0.3);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .focus-timer {
            background: rgba(15, 23, 42, 0.7);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .timer-display {
            font-size: 48px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            color: var(--accent-light);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .timer-label {
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .focus-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 10px 16px;
            font-size: 12px;
        }

        /* Category Selector */
        .categories-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-out 1.2s both;
        }

        .categories-card h3 {
            font-family: var(--font-display);
            font-size: 16px;
            margin-bottom: 15px;
        }

        .category-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .category-btn {
            padding: 12px 16px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 13px;
            transition: all 0.3s ease;
            text-align: left;
        }

        .category-btn:hover,
        .category-btn.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3) 0%, rgba(236, 72, 153, 0.2) 100%);
            border-color: var(--primary);
            color: var(--text-primary);
        }

        /* Goal Cards Grid */
        .goals-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideRight 0.6s ease-out 1.5s both;
        }

        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .goals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            animation: fadeIn 1s ease-out 1.8s both;
        }

        .goal-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .goal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .goal-card:hover {
            background: rgba(30, 41, 59, 0.9);
            border-color: var(--primary);
            transform: translateY(-4px);
        }

        .goal-card:hover::before {
            transform: scaleX(1);
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .goal-title {
            font-weight: 600;
            font-size: 15px;
        }

        .goal-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            transition: all 0.3s ease;
        }

        .goal-checkbox:hover {
            border-color: var(--primary);
        }

        .goal-checkbox.checked {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .goal-category {
            display: inline-block;
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .goal-notes {
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 12px;
            min-height: 30px;
        }

        .goal-progress {
            background: rgba(15, 23, 42, 0.5);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .progress-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .goal-footer {
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }

        .btn-mini {
            padding: 6px 10px;
            font-size: 11px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            text-align: center;
        }

        .btn-mini:hover {
            background: rgba(99, 102, 241, 0.3);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* Calendar */
        .calendar-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-out 2.1s both;
        }

        .calendar-card h3 {
            font-family: var(--font-display);
            font-size: 16px;
            margin-bottom: 15px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-header button {
            background: transparent;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 18px;
            padding: 5px 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }

        .day-header {
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            padding: 8px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border-radius: 6px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .day-cell:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.2);
        }

        .day-cell.today {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            font-weight: 600;
            color: white;
        }

        .day-cell.other-month {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-family: var(--font-display);
            font-size: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 13px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.7);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 25px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            header {
                grid-template-columns: 1fr;
                gap: 15px;
                text-align: center;
            }

            .time-display {
                text-align: center;
            }

            .focus-controls {
                grid-template-columns: 1fr;
            }

            .goals-grid {
                grid-template-columns: 1fr;
            }

            .timer-display {
                font-size: 36px;
            }

            .modal-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">⚡ Momentum</div>
            <div class="daily-quote">
                <p id="quote-text">"The only way to do great work is to love what you do."</p>
                <div class="author">— Steve Jobs</div>
            </div>
            <div class="time-display">
                <h3 id="current-time">12:00</h3>
                <p id="current-date">Monday, Dec 01</p>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-grid">
            <!-- Left Column: Focus Mode & Goals -->
            <div>
                <!-- Focus Mode Card -->
                <div class="focus-mode-card">
                    <h2>🎯 Quiet Hour</h2>
                    <div class="focus-controls">
                        <input type="number" class="focus-input" id="focusMinutes" placeholder="Minutes" value="25" min="1" max="180">
                        <select class="focus-input" id="focusMusic">
                            <option value="rain">🌧️ Rain</option>
                            <option value="forest">🌲 Forest</option>
                            <option value="ocean">🌊 Ocean</option>
                            <option value="cafe">☕ Cafe</option>
                            <option value="none">🔇 Silence</option>
                        </select>
                    </div>
                    <div class="focus-timer">
                        <div class="timer-display" id="timerDisplay">25:00</div>
                        <div class="timer-label">Focus Time</div>
                    </div>
                    <div class="focus-buttons">
                        <button class="btn btn-primary btn-small" id="startBtn" onclick="startFocus()">Start Session</button>
                        <button class="btn btn-secondary btn-small" id="pauseBtn" onclick="pauseFocus()" style="display: none;">Pause</button>
                        <button class="btn btn-secondary btn-small" onclick="resetFocus()">Reset</button>
                    </div>
                </div>

                <!-- Goals Section -->
                <div class="goals-section" style="margin-top: 30px;">
                    <div class="section-title">📋 Your Goals</div>
                    <div class="goals-grid" id="goalsGrid"></div>
                    <button class="btn btn-primary" onclick="openAddGoalModal()" style="margin-top: 20px; width: 100%;">+ Add New Goal</button>
                </div>
            </div>

            <!-- Right Column: Categories & Calendar -->
            <div>
                <!-- Categories Card -->
                <div class="categories-card">
                    <h3>📂 Categories</h3>
                    <div class="category-list" id="categoryList"></div>
                </div>

                <!-- Calendar Card -->
                <div class="calendar-card" style="margin-top: 30px;">
                    <h3>📅 Calendar</h3>
                    <div class="calendar-header">
                        <button onclick="previousMonth()">←</button>
                        <span id="monthYear"></span>
                        <button onclick="nextMonth()">→</button>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Goal Modal -->
    <div class="modal" id="addGoalModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Create Goal</span>
                <button class="close-btn" onclick="closeAddGoalModal()">×</button>
            </div>
            <div class="form-group">
                <label>Goal Title</label>
                <input type="text" id="goalTitle" placeholder="e.g., Complete project proposal">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="goalCategory">
                    <option value="Work">Work</option>
                    <option value="Health">Health</option>
                    <option value="Learning">Learning</option>
                    <option value="Hobbies">Hobbies</option>
                    <option value="Personal">Personal</option>
                </select>
            </div>
            <div class="form-group">
                <label>Description / Notes</label>
                <textarea id="goalNotes" placeholder="Add context or helpful notes..." rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>Target Days</label>
                <input type="number" id="goalDays" placeholder="e.g., 7" value="7" min="1">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeAddGoalModal()">Cancel</button>
                <button class="btn btn-primary" onclick="addGoal()">Create Goal</button>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let goals = [];
        let focusTime = 25;
        let timerInterval = null;
        let isRunning = false;
        let currentMonth = new Date();
        let selectedCategory = 'All';

        const quotes = [
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
            { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
            { text: "The future depends on what you do today.", author: "Mahatma Gandhi" },
            { text: "You are never too old to set another goal or to dream a new dream.", author: "C.S. Lewis" },
            { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
            { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
            { text: "Everything you want is on the other side of fear.", author: "Jack Canfield" },
            { text: "The only impossible journey is the one you never begin.", author: "Tony Robbins" },
            { text: "Your limitation—it's only your imagination.", author: "Unknown" }
        ];

        const categories = ['All', 'Work', 'Health', 'Learning', 'Hobbies', 'Personal'];

        // Initialize
        function init() {
            updateClock();
            updateQuote();
            renderCategories();
            renderCalendar();
            loadGoalsFromStorage();
            renderGoals();
            setInterval(updateClock, 1000);
            setInterval(updateQuote, 60000); // New quote every minute
        }

        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('current-date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        }

        // Quote
        function updateQuote() {
            const quote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quote-text').textContent = `"${quote.text}"`;
            document.querySelector('.author').textContent = `— ${quote.author}`;
        }

        // Categories
        function renderCategories() {
            const list = document.getElementById('categoryList');
            list.innerHTML = categories.map(cat => 
                `<button class="category-btn ${cat === selectedCategory ? 'active' : ''}" onclick="filterCategory('${cat}')">${cat === 'All' ? '✨ All Goals' : (cat === 'Work' ? '💼' : cat === 'Health' ? '💪' : cat === 'Learning' ? '🎓' : cat === 'Hobbies' ? '🎮' : '⭐') + ' ' + cat}</button>`
            ).join('');
        }

        function filterCategory(cat) {
            selectedCategory = cat;
            renderCategories();
            renderGoals();
        }

        // Calendar
        function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            
            document.getElementById('monthYear').textContent = currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            
            let html = '';
            const dayLabels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayLabels.forEach(day => {
                html += `<div class="day-header">${day}</div>`;
            });
            
            // Previous month
            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="day-cell other-month">${daysInPrevMonth - i}</div>`;
            }
            
            // Current month
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const isToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
                html += `<div class="day-cell ${isToday ? 'today' : ''}">${day}</div>`;
            }
            
            // Next month
            const totalCells = (daysInPrevMonth + firstDay + daysInMonth);
            const remainingCells = 42 - totalCells;
            for (let day = 1; day <= remainingCells; day++) {
                html += `<div class="day-cell other-month">${day}</div>`;
            }
            
            document.getElementById('calendarGrid').innerHTML = html;
        }

        function previousMonth() {
            currentMonth.setMonth(currentMonth.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentMonth.setMonth(currentMonth.getMonth() + 1);
            renderCalendar();
        }

        // Goals Management
        function loadGoalsFromStorage() {
            const stored = localStorage.getItem('momentum-goals');
            goals = stored ? JSON.parse(stored) : [
                { id: 1, title: 'Morning workout', category: 'Health', notes: '30 min run or yoga', progress: 60, completed: false },
                { id: 2, title: 'Design homepage mockup', category: 'Work', notes: 'Desktop & mobile views', progress: 30, completed: false },
                { id: 3, title: 'Read design chapter', category: 'Learning', notes: 'Chapter 3-4', progress: 50, completed: false }
            ];
        }

        function saveGoalsToStorage() {
            localStorage.setItem('momentum-goals', JSON.stringify(goals));
        }

        function renderGoals() {
            const filtered = selectedCategory === 'All' ? goals : goals.filter(g => g.category === selectedCategory);
            const html = filtered.map(goal => `
                <div class="goal-card">
                    <div class="goal-header">
                        <div class="goal-title">${goal.title}</div>
                        <div class="goal-checkbox ${goal.completed ? 'checked' : ''}" onclick="toggleGoal(${goal.id})">${goal.completed ? '✓' : ''}</div>
                    </div>
                    <div class="goal-category">${goal.category}</div>
                    <div class="goal-notes">${goal.notes}</div>
                    <div class="goal-progress">
                        <div class="progress-label">
                            <span>Progress</span>
                            <span>${goal.progress}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${goal.progress}%"></div>
                        </div>
                    </div>
                    <div class="goal-footer">
                        <button class="btn-mini" onclick="updateProgress(${goal.id}, 10)">+10%</button>
                        <button class="btn-mini" onclick="deleteGoal(${goal.id})">Delete</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('goalsGrid').innerHTML = html;
        }

        function openAddGoalModal() {
            document.getElementById('addGoalModal').classList.add('active');
        }

        function closeAddGoalModal() {
            document.getElementById('addGoalModal').classList.remove('active');
            document.getElementById('goalTitle').value = '';
            document.getElementById('goalNotes').value = '';
        }

        function addGoal() {
            const title = document.getElementById('goalTitle').value.trim();
            const category = document.getElementById('goalCategory').value;
            const notes = document.getElementById('goalNotes').value.trim();
            
            if (!title) {
                alert('Please enter a goal title');
                return;
            }
            
            const newGoal = {
                id: Date.now(),
                title,
                category,
                notes,
                progress: 0,
                completed: false
            };
            
            goals.push(newGoal);
            saveGoalsToStorage();
            renderGoals();
            closeAddGoalModal();
        }

        function toggleGoal(id) {
            const goal = goals.find(g => g.id === id);
            if (goal) {
                goal.completed = !goal.completed;
                if (goal.completed) goal.progress = 100;
                saveGoalsToStorage();
                renderGoals();
            }
        }

        function updateProgress(id, amount) {
            const goal = goals.find(g => g.id === id);
            if (goal) {
                goal.progress = Math.min(100, goal.progress + amount);
                saveGoalsToStorage();
                renderGoals();
            }
        }

        function deleteGoal(id) {
            if (confirm('Delete this goal?')) {
                goals = goals.filter(g => g.id !== id);
                saveGoalsToStorage();
                renderGoals();
            }
        }

        // Focus Timer
        function startFocus() {
            if (isRunning) return;
            
            focusTime = parseInt(document.getElementById('focusMinutes').value) * 60;
            isRunning = true;
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'inline-flex';
            document.getElementById('focusMinutes').disabled = true;
            
            timerInterval = setInterval(() => {
                if (focusTime > 0) {
                    focusTime--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timerInterval);
                    isRunning = false;
                    alert('🎉 Focus session complete! Great job!');
                    resetFocus();
                }
            }, 1000);
        }

        function pauseFocus() {
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById('startBtn').style.display = 'inline-flex';
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('focusMinutes').disabled = false;
        }

        function resetFocus() {
            clearInterval(timerInterval);
            isRunning = false;
            focusTime = parseInt(document.getElementById('focusMinutes').value) * 60;
            updateTimerDisplay();
            document.getElementById('startBtn').style.display = 'inline-flex';
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('focusMinutes').disabled = false;
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(focusTime / 60);
            const seconds = focusTime % 60;
            document.getElementById('timerDisplay').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // Start app
        init();
    </script>
</body>
</html>
